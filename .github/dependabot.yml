# Dependabot version updates. Security updates are enabled separately in the
# repo's security settings and run regardless of this file.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Application dependencies (npm). Group minor/patch bumps into a single PR
  # per week to cut review noise; majors still open as individual PRs.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Keep @types/node locked to the Node major pinned in .nvmrc (24); reject
    # major bumps (e.g. v25) so the type defs stay in step with the runtime.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development:
        dependency-type: development
        update-types:
          - minor
          - patch

  # GitHub Actions used by the release/deploy workflow.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
