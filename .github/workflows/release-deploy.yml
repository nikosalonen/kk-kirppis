name: Production deploy

# Deploy to Vercel production when a version tag is pushed (e.g. v1.0.0)
# or a GitHub Release is published.
on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

# Avoid overlapping production deploys.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # The Vercel CLI reads these from the environment automatically; passing
    # the token via env (not inline flags) keeps it out of the command line.
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings & env
        run: vercel pull --yes --environment=production

      - name: Build
        run: vercel build --prod

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod
